<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美時 Lotus Shirley 數位名片分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, sans-serif; background-color: #f3f3f3; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #E69100; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status { margin-top: 20px; color: #555; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div id="status">正在開啟分享清單...</div>

  <script>
    async function main() {
      try {
        await liff.init({ liffId: "2009646341-cKmE2OE1" });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        // 🌟 分享出去的名片內容
        const flexContent = {
          "type": "bubble",
          "size": "mega",
          "header": {
            "type": "box",
            "layout": "vertical",
            "backgroundColor": "#F5B921", // 修改為與 Logo 圖片背景一致的顏色
            "contents": [{
              "type": "image",
              "url": "https://www.lotuspharm.com/Common/images/logo.jpg",
              "size": "lg",
              "aspectMode": "fit"
            }],
            "paddingTop": "xl", "paddingBottom": "xl"
          },,
          "body": {
            "type": "box",
            "layout": "vertical",
            "paddingAll": "20px",
            "contents": [
              {
                "type": "box",
                "layout": "baseline",
                "contents": [
                  { "type": "text", "text": "楊涵鈞", "weight": "bold", "size": "xl", "color": "#111111", "flex": 0 },
                  { "type": "text", "text": "Shirley Yang", "size": "sm", "color": "#777777", "margin": "md", "flex": 0 }
                ]
              },
              { "type": "text", "text": "業務代表 / 診所暨藥局業務部", "size": "sm", "color": "#555555", "wrap": true, "margin": "md" },
              { "type": "text", "text": "shirley.yang@lotuspharm.com\n+886975856707", "size": "sm", "color": "#777777", "wrap": true, "margin": "lg" },
              {
                "type": "box",
                "layout": "vertical",
                "margin": "lg",
                "contents": [
                  { "type": "text", "text": "美時化學製藥股份有限公司", "size": "xs", "color": "#999999", "wrap": true },
                  { "type": "text", "text": "110021 台北市信義區松仁路277號17樓", "size": "xs", "color": "#999999", "wrap": true }
                ]
              },
              { "type": "separator", "margin": "xl", "color": "#DDDDDD" },
              {
                "type": "box",
                "layout": "vertical",
                "margin": "xl",
                "spacing": "sm",
                "contents": [
                  { "type": "button", "style": "primary", "height": "sm", "action": { "type": "uri", "label": "點擊撥打電話", "uri": "tel:+886975856707" }, "color": "#000000" },
                  { "type": "button", "style": "primary", "height": "sm", "action": { "type": "uri", "label": "訪問美時官方網站", "uri": "https://www.lotuspharm.com/zh-TW" }, "color": "#000000" }
                ]
              }
            ]
          }
        };

        const res = await liff.shareTargetPicker([{ "type": "flex", "altText": "您收到一張來自美時醫藥 Shirley 的數位名片", "contents": flexContent }]);
        if (res) { liff.closeWindow(); } else { document.getElementById('status').innerText = "已取消分享"; setTimeout(() => liff.closeWindow(), 1000); }
      } catch (e) { document.getElementById('status').innerText = "❌ 無法分享"; }
    }
    main();
  </script>
</body>
</html>
