<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>極簡測試</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2 id="msg">初始化中...</h2>
  <script>
    async function test() {
      try {
        await liff.init({ liffId: "2009646341-cKmE2OE1" }); // 確保 ID 正確
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          document.getElementById('msg').innerText = "準備分享...";
          const res = await liff.shareTargetPicker([
            { "type": "text", "text": "這是一則測試訊息" }
          ]);
          liff.closeWindow();
        }
      } catch (e) {
        document.getElementById('msg').innerText = "錯誤: " + e.message;
      }
    }
    test();
  </script>
</body>
</html>
