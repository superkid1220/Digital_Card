<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享名片</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #f3f3f3; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C00000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </script>
</head>
<body>
  <div id="status">正在開啟分享視窗...</div>
  <div class="loader"></div>

  <script>
    async function main() {
      // 1. 初始化 LIFF
      await liff.init({ liffId: "2009646341-cKmE2OE1" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      // 2. 定義【發送給別人】的名片內容 (已移除分享按鈕)
      const flexContent = {
        "type": "bubble",
        "size": "mega",
        "header": {
          "type": "box",
          "layout": "vertical",
          "backgroundColor": "#C00000",
          "contents": [{
            "type": "image",
            "url": "https://upload.wikimedia.org/wikipedia/commons/e/e8/Tesla_logo.png",
            "size": "xs",
            "aspectMode": "fit"
          }],
          "paddingTop": "xl", "paddingBottom": "xl"
        },
        "body": {
          "type": "box",
          "layout": "vertical",
          "paddingAll": "20px",
          "contents": [
            { "type": "text", "text": "陳凱勛 Felis Chen", "weight": "bold", "size": "xl", "color": "#111111" },
            { "type": "text", "text": "資深銷售顧問\nTesla Advisor", "size": "sm", "color": "#777777", "wrap": true, "margin": "md" },
            { "type": "text", "text": "kaischen@tesla.com\n+886970474361", "size": "sm", "color": "#777777", "wrap": true, "margin": "lg" },
            { "type": "text", "text": "臺北市南港區南港路三段 104 號", "size": "sm", "color": "#777777", "wrap": true, "margin": "lg" },
            { "type": "separator", "margin": "xl", "color": "#DDDDDD" },
            {
              "type": "box",
              "layout": "vertical",
              "margin": "xl",
              "spacing": "sm",
              "contents": [
                { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "點擊撥打電話", "uri": "tel:+886970474361" } },
                { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "試駕、換購與家用充電服務", "uri": "https://www.tesla.com/zh_tw/drive" } },
                { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "追蹤官方 Instagram", "uri": "https://www.instagram.com/tesla/" } },
                { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "加入 LINE 官方帳號", "uri": "https://line.me/R/ti/p/@tesla_taiwan" } }
                // 🚀 注意：這裡已經沒有「分享此名片」的按鈕了！
              ]
            }
          ]
        }
      };

      // 3. 呼叫分享視窗
      if (liff.isApiAvailable('shareTargetPicker')) {
        try {
          const res = await liff.shareTargetPicker([
            {
              "type": "flex",
              "altText": "陳凱勛 Felis Chen 的數位名片",
              "contents": flexContent
            }
          ]);
          if (res) {
            liff.closeWindow();
          } else {
            document.getElementById('status').innerText = "已取消分享";
          }
        } catch (error) {
          document.getElementById('status').innerText = "分享失敗：" + error.message;
        }
      }
    }
    main();
  </script>
</body>
</html>
