<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美時 Lotus Shirley 數位名片</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f3f3; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #E69100; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status { margin-top: 20px; color: #555; font-size: 16px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div id="status">正在啟動分享功能...</div>

  <script>
    async function main() {
      try {
        // 1. 初始化 LIFF
        await liff.init({ liffId: "2009646341-cKmE2OE1" });

        // 2. 檢查登入
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 🌟 3. 定義【傳送給別人看】的數位名片內容 (更新官方 Logo 連結)
        const flexContent = {
          "type": "bubble",
          "size": "mega",
          "header": {
            "type": "box",
            "layout": "vertical",
            "backgroundColor": "#E69100", // 美時橘底色
            "contents": [{
              "type": "image",
              "url": "https://api.lotuspharm.com/storage/site/01KAWVCV72Q3H0K0K5DVEJJWQP.png", // 更新為官方 API 連結
              "size": "lg", // 稍微調大一點讓 Logo 更清楚
              "aspectMode": "fit"
            }],
            "paddingTop": "xl", "paddingBottom": "xl"
          },
          "body": {
            "type": "box",
            "layout": "vertical",
            "paddingAll": "20px",
            "contents": [
              {
                "type": "box",
                "layout": "baseline",
                "contents": [
                  { "type": "text", "text": "楊涵鈞", "weight": "bold", "size": "xl", "color": "#111111", "flex": 0 },
                  { "type": "text", "text": "Shirley Yang", "size": "sm", "color": "#777777", "margin": "md", "flex": 0 }
                ]
              },
              { "type": "text", "text": "業務代表 / 診所暨藥局業務部", "size": "sm", "color": "#555555", "wrap": true, "margin": "md" },
              { "type": "text", "text": "shirley.yang@lotuspharm.com\n+886975856707", "size": "sm", "color": "#777777", "wrap": true, "margin": "lg" },
              {
                "type": "box",
                "layout": "vertical",
                "margin": "lg",
                "contents": [
                  { "type": "text", "text": "美時化學製藥股份有限公司", "size": "xs", "color": "#999999", "wrap": true },
                  { "type": "text", "text": "110021 台北市信義區松仁路277號17樓", "size": "xs", "color": "#999999", "wrap": true }
                ]
              },
              { "type": "separator", "margin": "xl", "color": "#DDDDDD" },
              // 按鈕區
              {
                "type": "box",
                "layout": "vertical",
                "margin": "xl",
                "spacing": "sm",
                "contents": [
                  { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "點擊撥打電話", "uri": "tel:+886975856707" }, "color": "#E69100" },
                  { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "訪問美時官方網站", "uri": "https://www.lotuspharm.com/zh-TW" }, "color": "#E69100" },
                  { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "追蹤官方 Instagram", "uri": "https://www.instagram.com/lotus_pharmaceuticals/" }, "color": "#E69100" },
                  { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "分享此名片給好友", "uri": "https://liff.line.me/2009646341-cKmE2OE1" }, "color": "#E69100" }
                ]
              }
            ]
          }
        };

        // 4. 啟動選擇器
        const isSupported = liff.isApiAvailable('shareTargetPicker');
        if (!isSupported) {
            alert("請在 LINE App 內開啟此連結以使用分享功能");
            return;
        }

        const res = await liff.shareTargetPicker([
          {
            "type": "flex",
            "altText": "您收到一張來自美時醫藥 Shirley 的數位名片",
            "contents": flexContent
          }
        ]);

        if (res) {
          liff.closeWindow(); // 分享成功後關閉視窗
        } else {
          document.getElementById('status').innerText = "已取消分享";
          setTimeout(() => liff.closeWindow(), 1200);
        }

      } catch (error) {
        console.error(error);
        document.getElementById('status').innerText = "❌ 暫時無法分享，請稍後再試";
      }
    }
    main();
  </script>
</body>
</html>
